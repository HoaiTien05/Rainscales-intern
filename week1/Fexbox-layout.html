<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Wedding Gallery</title>

    <style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* Header */
.header {
  text-align: center;
  padding: 20px;
}

.header h1 {
  font-style: italic;
}

/* FLEX CONTAINER */
.row {
  display: flex;
  gap: 10px; /* khoảng cách giữa các cột */
  padding: 10px;
}

/* Mỗi cột */
.column {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px; /* khoảng cách giữa ảnh */
}

/* Ảnh */
.column img {
  width: 100%;
  height:100%;
  border-radius: 8px;
  object-fit: cover;
}

/* Responsive */
@media (max-width: 800px) {
  .row {
    flex-wrap: wrap;
  }
  .column {
    flex: 50%;
  }
}

@media (max-width: 500px) {
  .column {
    flex: 100%;
  }
}
</style>
  </head>

  <body>

    <div class="header">
      <h1>"THE BEST THING TO HOLD ONTO IN LIFE IS EACH OTHER..."</h1>
    </div>

    <div class="row">

      <!-- Column 1 -->
      <div class="column">
        <img src="../img/hinh-nen-hoa-tulip-dep.jpg">
        <img src="../img/images (1).jpg">
        <img src="../img/images (4).jpg">
        <img src="../img/images.jpg">
        <img src="../img/hinh-nen-hoa-tulip-dep.jpg">
      </div>

      <!-- Column 2 -->
      <div class="column">
        <img src="../img/images (1).jpg">
        <img src="../img/images.jpg">
        <img src="../img/hinh-nen-hoa-tulip-dep.jpg">
        <img src="../img/hinh-nen-hoa-tulip-dep.jpg">
        <img src="../img/images (4).jpg">
      </div>

      <!-- Column 3 -->
      <div class="column">
        <img src="../img/images (4).jpg">
        <img src="../img/images (1).jpg">
        <img src="../img/hinh-nen-hoa-tulip-dep.jpg">
        <img src="../img/images.jpg">
        <img src="../img//images (1).jpg">
      </div>

      <!-- Column 4 -->
      <div class="column">
        <img src="../img/images.jpg">
        <img src="../img/hinh-nen-hoa-tulip-dep.jpg">
        <img src="../img/images (4).jpg">
        <img src="../img/images (1).jpg">
        <img src="../img/hinh-nen-hoa-tulip-dep.jpg">
      </div>

    </div>

  </body>
</html>
